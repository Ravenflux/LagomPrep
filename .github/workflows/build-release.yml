name: Build LagomPrep Release

on:
  push:
    tags:
      - 'v*'  # Triggers on any tag like v1.0, v1.1, v2.0 etc.

jobs:

  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask requests pywebview pyinstaller

      - name: Build Windows exe
        run: |
          python -m PyInstaller --onefile --windowed --name LagomPrep `
            --add-data "templates;templates" `
            --add-data "static;static" `
            app.py

      - name: Upload Windows exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagomPrep-Windows
          path: dist/LagomPrep.exe

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for pywebview
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.0 \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask requests pywebview pyinstaller

      - name: Build Linux binary
        run: |
          python -m PyInstaller --onefile --windowed --name LagomPrep \
            --add-data "templates:templates" \
            --add-data "static:static" \
            app.py

      - name: Upload Linux binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagomPrep-Linux
          path: dist/LagomPrep

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LagomPrep-Windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: LagomPrep-Linux
          path: artifacts/linux

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: LagomPrep ${{ steps.tag.outputs.TAG }}
          body: |
            ## LagomPrep ${{ steps.tag.outputs.TAG }}

            ### 📦 LagomPrep_Setup.exe — Recommended (Windows)
            Full installer with Start Menu entry, Desktop shortcut, and a clean
            uninstaller that lets you choose whether to keep your recipe data.

            ### ⚡ LagomPrep.exe — Portable (Windows)
            No installation needed. Download, double-click, and run from anywhere.

            ### 🐧 LagomPrep (Linux)
            Built on Ubuntu. Requires `python3-gi` and `gir1.2-webkit2-4.0` for
            the native window. Falls back to your default browser automatically
            if those aren't installed.

            ---

            ### What's included
            - 24 starter recipes across all meal categories
            - Meal planner, pantry tracker, TDEE calculator
            - Shopping list builder with pantry integration
            - Custom tags, themes, and cook log
            - USDA nutrition lookup (free API key required — see README)

            ---

            > *The worthy will find more than 24 recipes. Skål.* ⚡
          files: |
            artifacts/windows/LagomPrep.exe
            artifacts/linux/LagomPrep
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
